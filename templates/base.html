<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}CyberShield AI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --surface2: #1a1a24;
      --border: #2a2a3a;
      --accent: #6c63ff;
      --accent2: #ff6584;
      --green: #00e676;
      --orange: #ff9100;
      --red: #ff1744;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --font-mono: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); min-height: 100vh; }

    /* NAV */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(17,17,24,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-brand {
      font-family: var(--font-mono); font-size: 1.1rem; font-weight: 700;
      color: var(--accent); text-decoration: none; letter-spacing: 0.05em;
    }
    .nav-brand span { color: var(--accent2); }
    .nav-links { display: flex; gap: 0.5rem; }
    .nav-links a {
      padding: 0.4rem 1rem; border-radius: 6px;
      color: var(--muted); text-decoration: none; font-size: 0.9rem;
      transition: all 0.2s; font-weight: 500;
    }
    .nav-links a:hover, .nav-links a.active {
      background: var(--surface2); color: var(--text);
    }
    .nav-links a.active { color: var(--accent); }

    /* STATUS DOT */
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green); display: inline-block;
      box-shadow: 0 0 8px var(--green); animation: pulse 2s infinite;
      margin-right: 0.5rem;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* PAGE */
    .page { max-width: 900px; margin: 0 auto; padding: 2rem; }
    .page-header { margin-bottom: 2rem; }
    .page-header h1 {
      font-family: var(--font-mono); font-size: 1.8rem;
      color: var(--text); margin-bottom: 0.4rem;
    }
    .page-header p { color: var(--muted); font-size: 0.95rem; }

    /* CARDS */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .card h3 {
      font-family: var(--font-mono); font-size: 0.85rem;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    /* TEXTAREA */
    textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-family: var(--font-body);
      font-size: 1rem; padding: 1rem; resize: vertical; min-height: 120px;
      outline: none; transition: border-color 0.2s;
    }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }

    /* BUTTONS */
    .btn {
      padding: 0.7rem 1.5rem; border-radius: 8px; border: none;
      font-family: var(--font-body); font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; display: inline-flex;
      align-items: center; gap: 0.5rem;
    }
    .btn-primary {
      background: var(--accent); color: white;
    }
    .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-outline {
      background: transparent; color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    /* RESULT BADGE */
    .badge {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.3rem 0.8rem; border-radius: 20px;
      font-size: 0.8rem; font-weight: 600; font-family: var(--font-mono);
    }
    .badge-hate { background: rgba(255,23,68,0.15); color: var(--red); border: 1px solid rgba(255,23,68,0.3); }
    .badge-offensive { background: rgba(255,145,0,0.15); color: var(--orange); border: 1px solid rgba(255,145,0,0.3); }
    .badge-normal { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
    .badge-method { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    /* PROB BARS */
    .prob-bar-wrap { margin-bottom: 0.8rem; }
    .prob-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 0.3rem; }
    .prob-label span:first-child { color: var(--muted); }
    .prob-label span:last-child { font-family: var(--font-mono); }
    .prob-track {
      height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
    }
    .prob-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .fill-hate { background: linear-gradient(90deg, #ff1744, #ff6584); }
    .fill-offensive { background: linear-gradient(90deg, #ff9100, #ffd740); }
    .fill-normal { background: linear-gradient(90deg, #00c853, #00e676); }

    /* LOADING */
    .spinner {
      width: 20px; height: 20px; border: 2px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* HIDDEN */
    .hidden { display: none !important; }

    /* CATEGORIES */
    .cat-tag {
      display: inline-block; padding: 0.2rem 0.6rem; border-radius: 4px;
      font-size: 0.78rem; background: var(--surface2); color: var(--muted);
      border: 1px solid var(--border); margin: 0.2rem;
    }

    /* FOOTER */
    footer {
      text-align: center; padding: 2rem; color: var(--muted);
      font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 3rem;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="nav-brand">Cyber<span>Shield</span> AI</a>
  <div class="nav-links">
    <a href="/" {% if request.endpoint == 'index' %}class="active"{% endif %}>Dashboard</a>
    <a href="/text-analysis" {% if request.endpoint == 'text_analysis' %}class="active"{% endif %}>Text Analysis</a>
    <a href="/media-analysis" {% if request.endpoint == 'media_analysis' %}class="active"{% endif %}>Media Analysis</a>
  </div>
  <div style="display:flex;align-items:center;font-size:0.8rem;color:var(--muted)">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Checking...</span>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>CyberShield AI — Hate Speech Detection System</footer>

<script>
// Health check
async function checkHealth() {
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    let label, color;
    if (d.classifier === 'bilstm') {
      label = '🧠 BiLSTM Active'; color = 'var(--green)';
    } else if (d.classifier === 'claude_ai' || d.claude_ai) {
      label = '🤖 Claude AI Active'; color = '#6c63ff';
    } else if (d.classifier === 'adam' || d.adam_ready) {
      label = '⚡Classifier'; color = '#00bcd4';
    } else {
      label = '🔑 Keyword Classifier'; color = 'var(--orange)';
    }
    document.getElementById('statusText').textContent = label;
    document.getElementById('statusDot').style.background = color;
    document.getElementById('statusDot').style.boxShadow = `0 0 8px ${color}`;
  } catch {
    document.getElementById('statusText').textContent = 'Offline';
    document.getElementById('statusDot').style.background = 'var(--red)';
  }
}
checkHealth();
</script>
{% block scripts %}{% endblock %}
</body>
</html>
